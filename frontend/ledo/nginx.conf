# Nginx configuration for Ledo on VPS Salon
# This file should be integrated into the main nginx config

# Ledo app - served under /ledo base path
location /ledo {
    alias /var/www/html/ledo;
    try_files $uri $uri/ /ledo/index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Gosen Success - Root app (existing)
location / {
    try_files $uri $uri/ /index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
